name: Build

on:
  push:
    branches: [ master, 'develop/*' ]
  pull_request:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Restore dependencies
        run: dotnet restore

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/global.json') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Build
        run: dotnet build --no-restore --configuration Release

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/global.json') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run unit tests with coverage
        run: dotnet test --configuration Release --no-build --results-directors ./TestResults -- --coverage --coverage-output-format cobertura \
          --report-trx --treenode-filter "/*/*/*/*[Category=UnitTest]"

      - name: Upload TRX artifact
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: trx-unit
          path: ./TestResults/*.trx

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage-unit
          path: ./TestResults/**/*.cobertura.xml

  component-test:
    name: Component test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/global.json') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run Blazor component tests with coverage
        run: dotnet test --configuration Release --no-build --results-directors ./TestResults -- --coverage --coverage-output-format cobertura \
          --report-trx --treenode-filter "/*/*/*/*[Category=Components]"

      - name: Upload TRX artifact
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: trx-component
          path: ./TestResults/*.trx

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage-component
          path: ./TestResults/**/*.cobertura.xml

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          
      - name: Restore dependencies
        run: dotnet restore

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/global.json') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Build
        run: dotnet build --configuration Release

      - name: Run integration tests with coverage
        run: dotnet test --configuration Release --no-build --results-directors ./TestResults -- --coverage --coverage-output-format cobertura \
          --report-trx --treenode-filter "/*/*/*/*[Category=Integration]"

      - name: Upload TRX artifact
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: trx-integration
          path: ./TestResults/*.trx

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-integration
          path: ./TestResults/**/*.cobertura.xml

  report:
    name: Report
    runs-on: ubuntu-latest
    needs: [ test, component-test, integration-test ]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all TRX artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: trx-*
          path: TestResults
          merge-multiple: true

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: coverage-*
          path: TestResults
          merge-multiple: true

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: TestResults/*.trx
          reporter: dotnet-trx
          fail-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          directory: TestResults
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Qodana code inspection
        uses: JetBrains/qodana-action@v2025.3
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_1507766807 }}
          QODANA_ENDPOINT: 'https://qodana.cloud'
        with:
          cache-default-branch-only: true